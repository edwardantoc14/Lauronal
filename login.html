<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: maroon;
            font-family: sans-serif;
            margin: 0;
        }

        .login-container {
            background: #E89528;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px; /* Limits the width for better look */
        }

        .login-form {
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers items horizontally */
        }

        .login-form img {
            width: 120px;
            height: auto;
            margin-bottom: 1rem;
            border-radius: 50%; /* Optional: keeps the logo circular */
        }

        .login-form h2 {
            text-align: center;
            width: 100%;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
        }

        .input-group label {
            width: 100px; /* Fixed width for labels ensures inputs align */
            font-weight: bold;
        }

        .input-group input {
            flex: 1; /* Takes up remaining space */
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            width: 100%; /* Full width for better clickability */
            padding: 12px;
            background-color: maroon;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        p {
            margin-top: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <form action="#" method="post" class="login-form">
            <img src="c:\Users\wardo\Downloads\Gemini_Generated_Image_zb324ezb324ezb32.png" alt="Logo">
            
            <h2>LOGIN HERE</h2>
            
            <div class="input-group">
                <label for="Username">Username:</label>
                <input type="text" id="Username" placeholder="Enter your Username" name="Username">
            </div>
            
            <div class="input-group">
                <label for="Password">Password:</label>
                <input type="password" id="Password" placeholder="Enter your Password" name="Password">
            </div>
            
            <button type="submit">LOGIN</button>

            <p>Not registered yet? <a href="#">sign up</a></p>
        </form>
    </div>
</body>
</html>
